<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spencer, Bourne, Sleaden World Cup 2026 Sweepstake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .team-flag { width: 20px; height: 14px; object-fit: cover; border-radius: 2px; flex-shrink: 0; display: inline-block; }
        .match-flag { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; vertical-align: middle; margin-right: 4px; display: inline-block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-3 sm:p-5 text-base">

<div class="max-w-3xl mx-auto">

    <h1 class="text-center text-gray-800 font-bold mb-6 text-xl sm:text-2xl leading-snug">
        Spencer, Bourne &amp; Sleaden<br>🏆 World Cup 2026 Sweepstake 🏆
    </h1>

    <!-- Tabs -->
    <div class="flex flex-wrap border-b-2 border-gray-200 mb-5 gap-0.5">
        <button class="tab-btn flex-1 py-2 px-3 text-sm text-gray-500 bg-transparent border-0 cursor-pointer rounded-t whitespace-nowrap text-center hover:text-blue-600 hover:bg-blue-50 transition-colors" onclick="showTab('people', this)">👥 People</button>
        <button class="tab-btn flex-1 py-2 px-3 text-sm text-gray-500 bg-transparent border-0 cursor-pointer rounded-t whitespace-nowrap text-center hover:text-blue-600 hover:bg-blue-50 transition-colors" onclick="showTab('teams', this)">🌍 Teams</button>
        <button class="tab-btn flex-1 py-2 px-3 text-sm text-gray-500 bg-transparent border-0 cursor-pointer rounded-t whitespace-nowrap text-center hover:text-blue-600 hover:bg-blue-50 transition-colors" onclick="showTab('results', this)">✅ Results</button>
        <button class="tab-btn flex-1 py-2 px-3 text-sm text-gray-500 bg-transparent border-0 cursor-pointer rounded-t whitespace-nowrap text-center hover:text-blue-600 hover:bg-blue-50 transition-colors" onclick="showTab('upcoming', this)">📅 Upcoming</button>
    </div>

    <!-- People Tab -->
    <div id="tab-people" class="tab-content active">
        <div class="overflow-x-auto rounded-xl shadow">
            <table class="w-full min-w-[380px] bg-white border-collapse text-base">
                        <th class="py-3 px-3">Name</th>
                        <th class="py-3 px-3">Teams</th>
                    </tr>
                </thead>
                <tbody id="people-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Teams Tab -->
    <div id="tab-teams" class="tab-content">
        <div class="overflow-x-auto rounded-xl shadow">
            <table class="w-full min-w-[380px] bg-white border-collapse text-base">
                        <th class="py-3 px-3">Team</th>
                        <th class="py-3 px-3">Owner</th>
                        <th class="py-3 px-3 text-center w-10">P</th>
                        <th class="py-3 px-3 text-center w-10">W</th>
                        <th class="py-3 px-3 text-center w-10">D</th>
                        <th class="py-3 px-3 text-center w-10">L</th>
                    </tr>
                </thead>
                <tbody id="teams-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Results Tab -->
    <div id="tab-results" class="tab-content">
        <div id="results-container" class="text-gray-400 text-center py-8">Loading results…</div>
    </div>

    <!-- Upcoming Games Tab -->
    <div id="tab-upcoming" class="tab-content">
        <div id="upcoming-container" class="text-gray-400 text-center py-8">Loading upcoming games…</div>
    </div>

</div>

<script>
    // ================================================================
    // SWEEPSTAKE DATA
    // ================================================================
    const participants = [
        { name: "Arlo",    color: "bg-blue-600",    teams: ["Turkey", "DR Congo"] },
        { name: "Luca",    color: "bg-emerald-600", teams: ["Japan", "Tunisia", "Egypt"] },
        { name: "Louise",  color: "bg-pink-500",    teams: ["France", "Jordan"] },
        { name: "John",    color: "bg-indigo-600",  teams: ["Australia", "Panama"] },
        { name: "Pip",     color: "bg-amber-500",   teams: ["Switzerland", "Netherlands"] },
        { name: "James",   color: "bg-orange-500",  teams: ["Belgium", "Iraq"] },
        { name: "Archie",  color: "bg-teal-600",    teams: ["Canada", "Spain", "Cape Verde"] },
        { name: "Felix",   color: "bg-purple-600",  teams: ["South Africa", "Norway", "Ghana"] },
        { name: "Jenny",   color: "bg-rose-500",    teams: ["Portugal", "Croatia"] },
        { name: "Mike",    color: "bg-cyan-700",    teams: ["Scotland", "USA", "Ivory Coast"] },
        { name: "Diane",   color: "bg-lime-600",    teams: ["Haiti", "Sweden", "Senegal"] },
        { name: "Jane",    color: "bg-violet-600",  teams: ["South Korea", "Morocco", "Austria"] },
        { name: "Holly",   color: "bg-red-500",     teams: ["Qatar", "Ecuador", "England"] },
        { name: "Josh",    color: "bg-sky-600",     teams: ["Mexico", "Bosnia and Herzegovina"] },
        { name: "Jack",    color: "bg-green-600",   teams: ["Czechia", "Germany", "New Zealand"] },
        { name: "Mat",     color: "bg-yellow-600",  teams: ["Brazil", "Iran", "Uruguay"] },
        { name: "Phoebe",  color: "bg-fuchsia-600", teams: ["Paraguay", "Colombia"] },
        { name: "Amelia",  color: "bg-slate-500",   teams: ["Curacao", "Saudi Arabia", "Argentina"] },
        { name: "Nikki",   color: "bg-stone-600",   teams: ["Algeria", "Uzbekistan"] },
    ];

    const stadiumTimezones = [
        {
            "stadium_id": "1",
            "timezone": "America/Mexico_City"
        },
        {
            "stadium_id": "2",
            "timezone": "America/Mexico_City"
        },
        {
            "stadium_id": "3",
            "timezone": "America/Monterrey"
        },
        {
            "stadium_id": "4",
            "timezone": "America/Chicago"
        },
        {
            "stadium_id": "5",
            "timezone": "America/Chicago"
        },
        {
            "stadium_id": "6",
            "timezone": "America/Chicago"
        },
        {
            "stadium_id": "7",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "8",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "9",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "10",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "11",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "12",
            "timezone": "America/New_York"
        },
        {
            "stadium_id": "13",
            "timezone": "America/Vancouver"
        },
        {
            "stadium_id": "14",
            "timezone": "America/Los_Angeles"
        },
        {
            "stadium_id": "15",
            "timezone": "America/Los_Angeles"
        },
        {
            "stadium_id": "16",
            "timezone": "America/Los_Angeles"
        }
    ]

    // Build stadium_id -> timezone lookup
    const stadiumTzLookup = Object.fromEntries(
        stadiumTimezones.map(s => [s.stadium_id, s.timezone])
    );

    // Parse a game's local_date ("MM/DD/YYYY HH:MM") in the stadium's timezone
    // and return a Date in the user's local time.
    function parseGameTime(localDateStr, stadiumId) {
        const tz = stadiumTzLookup[stadiumId];
        if (!tz || !localDateStr) return null;
        const [datePart, timePart] = localDateStr.split(' ');
        if (!datePart || !timePart) return null;
        const [month, day, year] = datePart.split('/').map(Number);
        const [hour, minute] = timePart.split(':').map(Number);

        // Iteratively find the UTC instant that equals this local time in the stadium tz
        const fmt = new Intl.DateTimeFormat('en-CA', {
            timeZone: tz,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', hour12: false
        });
        let utc = Date.UTC(year, month - 1, day, hour, minute);
        for (let i = 0; i < 3; i++) {
            const parts = Object.fromEntries(fmt.formatToParts(utc).map(p => [p.type, p.value]));
            const tzHour = parts.hour === '24' ? 0 : +parts.hour;
            const diff = utc - Date.UTC(+parts.year, +parts.month - 1, +parts.day, tzHour, +parts.minute);
            utc = Date.UTC(year, month - 1, day, hour, minute) + diff;
        }
        return new Date(utc);
    }

    function formatGameTime(localDateStr, stadiumId) {
        const date = parseGameTime(localDateStr, stadiumId);
        if (!date) return localDateStr || '';
        return date.toLocaleString(undefined, {
            weekday: 'short', day: 'numeric', month: 'short',
            hour: '2-digit', minute: '2-digit'
        });
    }

    // Normalise API team names to our canonical names
    const teamAliases = {
        "türkiye": "Turkey", "turkiye": "Turkey", "turkey": "Turkey",
        "dr congo": "DR Congo", "congo dr": "DR Congo", "democratic republic of congo": "DR Congo", "democratic republic of the congo": "DR Congo",
        "japan": "Japan", "tunisia": "Tunisia", "egypt": "Egypt",
        "france": "France", "jordan": "Jordan",
        "australia": "Australia", "panama": "Panama",
        "switzerland": "Switzerland",
        "netherlands": "Netherlands", "holland": "Netherlands",
        "belgium": "Belgium", "iraq": "Iraq",
        "canada": "Canada", "spain": "Spain",
        "cape verde": "Cape Verde", "cabo verde": "Cape Verde",
        "south africa": "South Africa", "norway": "Norway", "ghana": "Ghana",
        "portugal": "Portugal", "croatia": "Croatia",
        "scotland": "Scotland",
        "usa": "USA", "united states": "USA", "united states of america": "USA",
        "ivory coast": "Ivory Coast", "côte d'ivoire": "Ivory Coast", "cote d'ivoire": "Ivory Coast",
        "haiti": "Haiti", "sweden": "Sweden", "senegal": "Senegal",
        "south korea": "South Korea", "korea republic": "South Korea",
        "morocco": "Morocco", "austria": "Austria",
        "qatar": "Qatar", "ecuador": "Ecuador", "england": "England",
        "mexico": "Mexico",
        "bosnia and herzegovina": "Bosnia and Herzegovina", "bosnia & herzegovina": "Bosnia and Herzegovina",
        "czechia": "Czechia", "czech republic": "Czechia",
        "germany": "Germany", "new zealand": "New Zealand",
        "brazil": "Brazil", "iran": "Iran", "uruguay": "Uruguay",
        "paraguay": "Paraguay", "colombia": "Colombia",
        "curacao": "Curacao", "curaçao": "Curacao",
        "saudi arabia": "Saudi Arabia", "argentina": "Argentina",
        "algeria": "Algeria", "uzbekistan": "Uzbekistan",
    };

    // Build team -> owner lookup
    const teamOwner = {};
    participants.forEach(p => {
        p.teams.forEach(t => { teamOwner[t.toLowerCase()] = p.name; });
    });

    // Build name -> participant lookup for avatar use
    const participantByName = {};
    participants.forEach(p => { participantByName[p.name] = p; });

    function avatar(person) {
        const p = typeof person === 'string' ? participantByName[person] : person;
        if (!p) return '';
        // Photo in a circle; onerror removes img revealing coloured initial fallback
        return `<span class="relative inline-flex items-center justify-center w-7 h-7 rounded-full overflow-hidden flex-shrink-0 ${p.color}" title="${p.name}">` +
               `<span class="text-white text-xs font-bold">${p.name[0]}</span>` +
               `<img src="people/${p.name}.jpg" alt="" class="absolute inset-0 w-full h-full object-cover object-top" onerror="this.remove()">` +
               `</span>`;
    }

    // Flag lookup: canonical name (lowercase) -> flag URL — populated at init
    const teamFlags = {};

    async function loadTeamFlags() {
        try {
            const r = await fetch('https://worldcup26.ir/get/teams');
            const json = await r.json();
            const teams = json.teams || [];
            teams.forEach(t => {
                if (t.flag && t.name_en) {
                    const canonical = normaliseTeam(t.name_en);
                    teamFlags[canonical.toLowerCase()] = t.flag;
                }
            });
        } catch (e) {
            console.warn('Could not load team flags', e);
        }
    }

    function getFlag(teamName) {
        if (!teamName) return '';
        const canonical = normaliseTeam(teamName);
        const url = teamFlags[canonical.toLowerCase()];
        return url ? `<img class="team-flag" src="${url}" alt="">` : '';
    }

    function getMatchFlag(teamName) {
        if (!teamName) return '';
        const canonical = normaliseTeam(teamName);
        const url = teamFlags[canonical.toLowerCase()];
        return url ? `<img class="match-flag" src="${url}" alt="">` : '';
    }

    function normaliseTeam(apiName) {
        if (!apiName) return apiName;
        const lower = apiName.toLowerCase().trim();
        return teamAliases[lower] || apiName;
    }

    function getOwner(apiTeamName) {
        if (!apiTeamName) return null;
        const normalised = normaliseTeam(apiTeamName);
        return teamOwner[normalised.toLowerCase()] || null;
    }

    // ================================================================
    // TAB SWITCHING
    // ================================================================
    function showTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        btn.classList.add('active');
    }

    // Set first tab active on load
    document.querySelector('.tab-btn').classList.add('active');

    // ================================================================
    // TEAM STATS  (keyed by canonical team name, lowercase)
    // ================================================================
    const teamStats = {};

    function buildTeamStats(games) {
        // Reset
        Object.keys(teamStats).forEach(k => delete teamStats[k]);
        games.filter(isFinished).forEach(m => {
            const homeKey = normaliseTeam(m.home_team_name_en).toLowerCase();
            const awayKey = normaliseTeam(m.away_team_name_en).toLowerCase();
            const hs = parseInt(m.home_score, 10);
            const as = parseInt(m.away_score, 10);
            if (isNaN(hs) || isNaN(as)) return;
            [homeKey, awayKey].forEach(k => {
                if (!teamStats[k]) teamStats[k] = { p: 0, w: 0, d: 0, l: 0 };
            });
            teamStats[homeKey].p++;
            teamStats[awayKey].p++;
            if (hs > as)      { teamStats[homeKey].w++; teamStats[awayKey].l++; }
            else if (hs < as) { teamStats[homeKey].l++; teamStats[awayKey].w++; }
            else              { teamStats[homeKey].d++; teamStats[awayKey].d++; }
        });
    }

    function getStats(teamName) {
        const key = normaliseTeam(teamName).toLowerCase();
        return teamStats[key] || { p: 0, w: 0, d: 0, l: 0 };
    }

    function statCell(val) {
        const colour = val === 0 ? 'text-gray-300' : 'text-gray-700';
        return `<td class="py-2.5 px-2 text-center align-middle ${colour}"><strong>${val}</strong></td>`;
    }

    // ================================================================
    // RENDER PEOPLE
    // ================================================================
    function renderPeople() {
        const tbody = document.getElementById('people-tbody');
        tbody.innerHTML = '';
        const sorted = [...participants].sort((a, b) => a.name.localeCompare(b.name));
        sorted.forEach((p, i) => {
            const tr = document.createElement('tr');
            tr.className = i % 2 === 1 ? 'bg-gray-50' : 'bg-white';
            tr.innerHTML = `
                <td class="py-2.5 px-3 text-gray-400 text-xs">${i + 1}</td>
                <td class="py-2.5 px-3">
                    <div class="flex items-center gap-2">
                        ${avatar(p)}
                        <span class="font-semibold text-gray-800">${p.name}</span>
                    </div>
                </td>
                <td class="py-2.5 px-3">${p.teams.map(t => `<span class="inline-flex items-center gap-1 bg-blue-50 text-gray-800 text-sm rounded-full px-2.5 py-0.5 m-0.5">${getFlag(t)}${t}</span>`).join('')}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ================================================================
    // RENDER TEAMS
    // ================================================================
    function renderTeams() {
        const tbody = document.getElementById('teams-tbody');
        tbody.innerHTML = '';

        // Build flat list of all teams with owner + stats
        const rows = [];
        participants.forEach(p => {
            p.teams.forEach(t => {
                const s = getStats(t);
                rows.push({ team: t, owner: p.name, ...s });
            });
        });

        // Sort by points (3W+1D) desc, then games played desc, then name asc
        rows.sort((a, b) => (b.w * 3 + b.d) - (a.w * 3 + a.d) || b.p - a.p || a.team.localeCompare(b.team));

        rows.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.className = i % 2 === 1 ? 'bg-gray-50' : 'bg-white';
            tr.innerHTML = `
                <td class="py-2.5 px-3"><span class="inline-flex items-center gap-2">${getFlag(r.team)}<strong class="text-gray-800">${r.team}</strong></span></td>
                <td class="py-2.5 px-3">
                    <div class="flex items-center gap-2">
                        ${avatar(r.owner)}
                        <span class="text-gray-700">${r.owner}</span>
                    </div>
                </td>
                ${statCell(r.p)}
                ${statCell(r.w)}
                ${statCell(r.d)}
                ${statCell(r.l)}
            `;
            tbody.appendChild(tr);
        });
    }

    // ================================================================
    // FETCH & RENDER MATCHES
    // ================================================================
    function isFinished(match) {
        return (match.finished || '').toString().toUpperCase() === 'TRUE'
            || (match.time_elapsed || '').toLowerCase() === 'finished';
    }

    function isLive(match) {
        const t = (match.time_elapsed || '').toLowerCase().trim();
        return !isFinished(match) && t !== '' && t !== 'null' && t !== 'notstarted';
    }

    function statusBadge(match) {
        if (isLive(match)) return `<span class="inline-block text-xs font-bold uppercase px-2 py-0.5 rounded-full bg-red-100 text-red-600 ml-2">Live</span>`;
        if (isFinished(match)) return `<span class="inline-block text-xs font-bold uppercase px-2 py-0.5 rounded-full bg-green-100 text-green-700 ml-2">FT</span>`;
        return `<span class="inline-block text-xs font-bold uppercase px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 ml-2">Scheduled</span>`;
    }

    function renderMatch(match, container) {
        const homeOwner = getOwner(match.home_team_name_en);
        const awayOwner = getOwner(match.away_team_name_en);
        const ownerTags = [homeOwner, awayOwner]
            .filter(Boolean)
            .map(o => `<span class="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-sm font-semibold rounded-lg px-2.5 py-1">${avatar(o)}${o}</span>`)
            .join('');

        const el = document.createElement('div');
        el.className = 'bg-white rounded-xl shadow-sm p-4 mb-3 border border-gray-100';
        el.innerHTML = `
            <div class="flex justify-between items-center flex-wrap gap-2">
                <div class="text-base text-gray-800">
                    ${getMatchFlag(match.home_team_name_en)}<strong>${match.home_team_name_en}</strong>
                    <span class="text-gray-400 mx-1">vs</span>
                    ${getMatchFlag(match.away_team_name_en)}<strong>${match.away_team_name_en}</strong>
                </div>
                ${(isFinished(match) || isLive(match)) ? `<div class="text-lg font-bold text-gray-900 whitespace-nowrap tabular-nums">${match.home_score ?? '-'} – ${match.away_score ?? '-'}</div>` : ''}
            </div>
            <div class="text-sm text-gray-500 mt-1.5">${formatGameTime(match.local_date, match.stadium_id)}${statusBadge(match)}</div>
            ${ownerTags ? `<div class="flex flex-wrap gap-1.5 mt-2">${ownerTags}</div>` : ''}
        `;
        container.appendChild(el);
    }

    async function fetchAndRender() {
        try {
            const response = await fetch('https://worldcup26.ir/get/games');
            const data = await response.json();
            const games = Array.isArray(data) ? data : (data.games || []);

            buildTeamStats(games);
            renderPeople();
            renderTeams();

            const resultsEl = document.getElementById('results-container');
            const upcomingEl = document.getElementById('upcoming-container');
            resultsEl.innerHTML = '';
            upcomingEl.innerHTML = '';

            const finished = games.filter(isFinished).sort((a, b) => {
                    const ta = parseGameTime(a.local_date, a.stadium_id);
                    const tb = parseGameTime(b.local_date, b.stadium_id);
                    return (tb || 0) - (ta || 0);
                });
            const notFinished = games
                .filter(g => !isFinished(g))
                .sort((a, b) => {
                    const ta = parseGameTime(a.local_date, a.stadium_id);
                    const tb = parseGameTime(b.local_date, b.stadium_id);
                    return (ta || 0) - (tb || 0);
                });

            if (finished.length === 0) {
                resultsEl.innerHTML = '<div class="text-gray-400 text-center py-10">No finished matches yet.</div>';
            } else {
                finished.forEach(m => renderMatch(m, resultsEl));
            }

            if (notFinished.length === 0) {
                upcomingEl.innerHTML = '<div class="text-gray-400 text-center py-10">No upcoming matches found.</div>';
            } else {
                notFinished.forEach(m => renderMatch(m, upcomingEl));
            }
        } catch (error) {
            document.getElementById('results-container').innerHTML = '<div class="text-red-600 text-center py-8">Failed to load results.</div>';
            document.getElementById('upcoming-container').innerHTML = '<div class="text-red-600 text-center py-8">Failed to load upcoming games.</div>';
            console.error(error);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    loadTeamFlags().then(() => {
        fetchAndRender();
    });
    setInterval(fetchAndRender, 60000);
</script>
</body>
</html>
